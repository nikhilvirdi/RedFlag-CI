version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: redflag-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - redflag_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redflag-redis
    restart: always
    ports:
      - "6380:6379"

volumes:
  redflag_pg_data:
